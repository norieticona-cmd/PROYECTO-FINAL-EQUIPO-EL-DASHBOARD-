{% extends 'base.html' %}

{% block content %}

<h2>Nuevo Mentor</h2>

<form method="POST">

    <div class="mb-3">
        <label class="form-label">
            Nombre
        </label>

        <input
            type="text"
            name="nombre"
            class="form-control"
            required>
    </div>

    <div class="mb-3">
        <label class="form-label">
            Especialidad
        </label>

        <input
            type="text"
            name="especialidad"
            class="form-control"
            required>
    </div>

    <div class="mb-3">
        <label class="form-label">
            Email
        </label>

        <input
            type="email"
            name="email"
            class="form-control"
            required>
    </div>

    <button class="btn btn-success">
        Guardar
    </button>

</form>

{% endblock %}
