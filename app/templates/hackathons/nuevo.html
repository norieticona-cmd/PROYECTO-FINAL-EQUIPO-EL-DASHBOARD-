{% extends 'base.html' %}

{% block content %}

<h2>Nuevo Hackathon</h2>

<form method="POST">

    <div class="mb-3">

        <label class="form-label">
            Nombre
        </label>

        <input
            type="text"
            name="nombre"
            class="form-control"
            required
        >

    </div>

    <div class="mb-3">

        <label class="form-label">
            Descripción
        </label>

        <textarea
            name="descripcion"
            class="form-control"
            rows="4"
            required></textarea>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Estado
        </label>

        <select
            name="estado"
            class="form-control">

            <option value="Planificado">
                Planificado
            </option>

            <option value="Activo">
                Activo
            </option>

            <option value="Finalizado">
                Finalizado
            </option>

        </select>

    </div>

    <button
        class="btn btn-success">

        Guardar

    </button>

</form>

{% endblock %}
