{% extends 'base.html' %}

{% block content %}

<h2>Nueva Evaluación</h2>

<form method="POST">

    <div class="mb-3">

        <label class="form-label">
            Puntaje
        </label>

        <input
            type="number"
            step="0.01"
            name="puntaje"
            class="form-control"
            required>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Observación
        </label>

        <textarea
            name="observacion"
            class="form-control"
            rows="4"></textarea>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Fecha
        </label>

        <input
            type="date"
            name="fecha"
            class="form-control"
            required>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Proyecto
        </label>

        <select
            name="proyecto_id"
            class="form-control">

            {% for proyecto in proyectos %}

            <option value="{{ proyecto.id }}">
                {{ proyecto.nombre }}
            </option>

            {% endfor %}

        </select>

    </div>

    <button class="btn btn-success">
        Guardar
    </button>

</form>

{% endblock %}
