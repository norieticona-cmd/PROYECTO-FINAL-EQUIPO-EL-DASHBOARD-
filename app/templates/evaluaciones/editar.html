{% extends 'base.html' %}

{% block content %}

<h2>Editar Evaluación</h2>

<form method="POST">

    <div class="mb-3">
        <label class="form-label">Puntaje</label>

        <input
            type="number"
            step="0.01"
            name="puntaje"
            value="{{ evaluacion.puntaje }}"
            class="form-control"
            required>
    </div>

    <div class="mb-3">
        <label class="form-label">Observación</label>

        <textarea
            name="observacion"
            class="form-control"
            rows="4">{{ evaluacion.observacion }}</textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Fecha</label>

        <input
            type="date"
            name="fecha"
            value="{{ evaluacion.fecha }}"
            class="form-control"
            required>
    </div>

    <div class="mb-3">

        <label class="form-label">
            Proyecto
        </label>

        <select
            name="proyecto_id"
            class="form-control">

            {% for proyecto in proyectos %}

            <option
                value="{{ proyecto.id }}"
                {% if proyecto.id == evaluacion.proyecto_id %}
                selected
                {% endif %}
            >
                {{ proyecto.nombre }}
            </option>

            {% endfor %}

        </select>

    </div>

    <button class="btn btn-warning">
        Actualizar
    </button>

</form>

{% endblock %}
