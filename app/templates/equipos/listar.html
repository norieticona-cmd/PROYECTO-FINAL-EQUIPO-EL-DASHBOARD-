{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between mb-3">
    <h2 class="titulo-equipos">Equipos</h2>
    <a href="/equipos/nuevo" class="btn btn-primary">
        Nuevo Equipo
    </a>
</div>

<table class="table table-bordered table-striped">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Hackathon</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for equipo in equipos %}
        <tr>
            <td>{{ equipo.id }}</td>
            <td>{{ equipo.nombre }}</td>
            <td>{{ equipo.hackathon.nombre }}</td>
            <td>
                <a href="/equipos/editar/{{ equipo.id }}" class="btn btn-warning btn-sm">Editar</a>
                <a href="/equipos/eliminar/{{ equipo.id }}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
